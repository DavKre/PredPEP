# Equivalent to run.sh: predpep_app, detached, GPU, restart=unless-stopped.
# For code-iteration bind-mounts, use run-dev.sh instead.

services:
  predpep:
    image: predpep:v1.3.0          # keep in sync with ./VERSION (scripts/build.sh also tags :latest)
    container_name: predpep_app
    ports:
      - "6363:6363"
    volumes:
      - predpep_data:/tmp/pepspec
    restart: unless-stopped
    pids_limit: 4096
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  predpep_data:
